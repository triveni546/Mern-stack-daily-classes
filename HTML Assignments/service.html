<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-image: linear-gradient(rgb(241, 191, 147), violet);
        padding: 150px;
      }

      form {
        width: 550px;
        height: auto;
        margin: auto;
      }

      fieldset {
        background-color: white;
        padding: 6%;
        font-weight: bold;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);

      }

      h1 {
        text-align: center;
      }

      label {
        display: inline-block;
        padding: 3px;
      }
      button {
        padding: 6px 12px;
        background-color: rgb(80, 206, 80);
        border-radius: 0px 0px 5px 5px;
        border-top-left-radius: 5px;
        border-top-right-radius: 5px;
        width: 100%;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <form action="">
      <fieldset>
        <h1>Service Request Form</h1>
        <label for="name">Customer Name:</label>
        <input
          type="text"
          id="name"
          placeholder="Enter customer name"
          required
        />
        <br /><br />
        <label for="number">Customer Number:</label>
        <input
          type="text"
          id="number"
          placeholder="Enter customer number"
          required
        />
        <br /><br />
        <label for="issue">Issue Type:</label>
        <select>
          <option value="Select Issue">Select</option>
          <option value="Laptop Repair">Laptop Repair</option>
          <option value="Hardware Problem">Hardware Problem</option>
          <option value="Software Problem">Software Problem</option>
          <option value="Internet Issue">Internet Issue</option>
        </select>
        <br /><br />
        <label for="Description">Description:</label>
        <br />
        <textarea name="Description" id="Description" required></textarea>
        <br /><br />
        <label for="priority">Priority:</label>
        <input type="radio" id="low" name="priority" value="Low" required />
        <label for="low">Low</label>
        <input
          type="radio"
          id="medium"
          name="priority"
          value="Medium"
          required
        />
        <label for="medium">Medium</label>
        <input type="radio" id="high" name="priority" value="high" required />
        <label for="high">High</label>
        <br /><br />
        <button type="submit">Submit</button>
      </fieldset>
    </form>
  </body>
</html>
