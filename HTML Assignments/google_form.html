<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f3f4;
        }

        .container {
            width: 450px;
            margin: 40px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #202124;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .radio-group, .checkbox-group {
            margin-top: 5px;
        }

        .radio-group label,
        .checkbox-group label {
            display: inline;
            font-weight: normal;
            margin-right: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3367d6;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Google form</h2>

    <form action="#" method="post">

   
        <label for="name">Full Name</label>
        <input type="text" id="name" name="full_name"
               placeholder="Enter your name" required>

        <!-- Email -->
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email"
               placeholder="Enter your email" required>

  
        <label for="age">Age</label>
        <input type="number" id="age" name="age"
               placeholder="Enter your age" min="10" max="100" required>

      
        <label>Gender</label>
        <div class="radio-group">
            <input type="radio" name="gender" value="male" required> Male
            <input type="radio" name="gender" value="female"> Female
            <input type="radio" name="gender" value="other"> Other
        </div>

 
        <label for="tech">Favorite Technology</label>
        <select id="tech" name="technology" required>
            <option value="">-- Select --</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="java">Java</option>
        </select>

    
        <label>Skills Known</label>
        <div class="checkbox-group">
            <input type="checkbox" name="skills" value="html"> HTML
            <input type="checkbox" name="skills" value="css"> CSS
            <input type="checkbox" name="skills" value="js"> JavaScript
        </div>

        <label for="feedback">Feedback</label>
        <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Write your feedback..." required></textarea>


        <label for="rating">Rating</label>

<select id="rating" name="rating" required>
  <option value="">Select rating</option>
  <option value="1">⭐ 1</option>
  <option value="2">⭐⭐ 2</option>
  <option value="3">⭐⭐⭐ 3</option>
  <option value="4">⭐⭐⭐⭐ 4</option>
  <option value="5">⭐⭐⭐⭐⭐ 5</option>
</select>

   
        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
