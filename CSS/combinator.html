<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ol + h1 {
        background-color: blueviolet;
        color: brown;
      }
      h4>p{
        background-color: rgb(171, 171, 238);
        color: rgb(194, 8, 58);

      }
      ol>li{
        margin: 20px;
        background-color: rgb(0, 255, 255);
      }
      ul p{
        
        background-color: rgb(237, 132, 132);
      }
      ol~h1{
        background-color: rgb(4, 171, 116);
      }

    </style>
  </head>
  <body>
    <h1>Order List</h1>
    <ol>
      <li>list-1</li>
      <li>list-2</li>
      <li>list-3</li>
      <li>list-4</li>
    </ol>
    <h1>Unordered list</h1>
    <ul>
      <li>
        <p>
            This program present in Unorderedlist
        </p>
      </li>
      <li>Unordered list-2</li>
      <li>Unordered list-3</li>
      <li>Unordered list-4</li>
    </ul>
    <h1>Heading in 3rd line</h1>
    <h3>
        <h4>
            <p>Heading-4</p>
        </h4>
    </h3>

  </body>
</html>
