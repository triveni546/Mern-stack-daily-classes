<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="get">
        <fieldset style="background-image: linear-gradient(white,lightblue);
         border-radius:10px 50px;
          padding: 30px;
           margin: 50px;">
            <legend align="center">login form</legend>
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" placeholder="Enter username" required maxlength="8" minlength="5">
             <br> <br>
            <label for="psw">Password:</label>
            <input type="text" name="password" id="psw" placeholder="Enter password" required>
            <br><br>
            <button type="submit">Login</button>
            <button type="reset">Cancel</button>
        </fieldset>
    </form>
</body>
</html>
